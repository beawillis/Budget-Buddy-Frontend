<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - BudgetBuddy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1>Create Account</h1>
      <input type="text" id="fullName" placeholder="Full name" autocomplete="name">
      <input type="email" id="regEmail" placeholder="Email address" autocomplete="email">
      <input type="password" id="regPassword" placeholder="Password" autocomplete="new-password">
      <button type="button" onclick="registerUser()">Create Account</button>
      <p id="registerMessage"></p>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="api.js"></script>
  <script src="Javascript.js"></script>
  <script src="register.js"></script>
</body>
</html>
