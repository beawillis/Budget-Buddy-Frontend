<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetBuddy AI Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header class="top-header">
      <div>
        <h1>AI Financial Assistant</h1>
        <p>Ask for money-saving tips, spending guidance, and loan advice.</p>
      </div>
      <nav class="top-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="wallet.html">Wallet</a>
        <a href="goals.html">Goals</a>
        <a href="reports.html">Reports</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      </nav>
    </header>

    <section class="ai-box">
      <h3>Ask the assistant</h3>
      <p id="aiGreeting" class="ai-note">Hello — ask the assistant for help with budgeting, saving, loans, and investing.</p>
      <div class="ai-input-row">
        <input type="text" id="aiInput" placeholder="Ask something like 'How can I save more this month?'">
        <button onclick="askAI()">Ask</button>
      </div>
      <p id="aiResponse" class="ai-response"></p>
    </section>
  </main>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="api.js"></script>
  <script src="Javascript.js"></script>
  <script src="ai-assistant.js"></script>
</body>
</html>
